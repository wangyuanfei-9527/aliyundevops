sources:
  repo:
    type: codeup
    name: "{{projectName}}"
    endpoint: "{{repoUrl}}"
    branch: master
    triggerEvents: push
    certificate:
      type: serviceConnection
      serviceConnection: "{{serviceConnectionId}}"
stages:
  build_stage:
    name: "Build image"
    jobs:
      build_job:
        name: "Docker build and push"
        runsOn:
          group: "{{runnerGroup}}"
          container: "{{container}}"
        steps:
          build_step:
            name: "Build and push"
            step: "Command"
            with:
              run: |
                docker build -t {{repository}}:latest .
                docker push {{repository}}:latest
  deploy_stage:
    name: "Deploy test"
    jobs:
      deploy_job:
        name: "Deploy on ECS"
        runsOn:
          group: "{{runnerGroup}}"
          container: "{{container}}"
        steps:
          deploy_step:
            name: "Deploy"
            step: "Command"
            with:
              run: |
                aliyun ecs RunCommand --Type RunShellScript --CommandContent "cd {{deployPath}} && ./deploy.sh"
